name: Build and deploy client to GitHub Pages

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install client dependencies
      working-directory: client
      run: npm ci

    - name: Build client
      working-directory: client
      run: npm run build

    - name: Debug list client and dist contents
      run: |
        echo "Project root listing:"
        ls -la
        echo "client listing:"
        ls -la client || true
        echo "client/dist listing:"
        ls -la client/dist || true

    - name: Upload artifact for GitHub Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: client/dist

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4